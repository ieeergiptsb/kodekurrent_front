<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kode Kurrent - Know Your Creators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen relative flex flex-col">

    <!-- Canvas Background -->
    <canvas id="starfield"></canvas>

    <!-- Navigation -->
    <nav
        class="w-full h-24 relative flex flex-row items-center justify-center md:px-20 z-50 fixed top-0 bg-gradient-to-b from-[#060608] to-transparent">

        <div class="absolute left-10 md:left-20 font-heading tracking-wider text-xl mt-2">
            <a href="/" class="hover:text-accent transition-colors">BACK</a>
        </div>

        <div
            class="font-heading font-bold text-xl md:text-4xl tracking-widest text-accent flex items-center gap-2 md:gap-3 px-2">
            <!-- IEEE logo -->
            <div
                class="relative flex items-center justify-center h-6 w-6 md:h-8 md:w-8 rounded-full overflow-hidden border border-[#8090B8]/50 shadow-[0_0_10px_rgba(128,144,184,0.5)] flex-shrink-0">
                <img src="images/logo.jpeg" alt="IEEE Logo" class="h-full w-full object-cover">
            </div>
            <a href="#" class="border-b-2 border-accent pb-1 mt-2">KNOW THE CREATORS</a>
        </div>

    </nav>

    <!-- Decorative Elements -->
    <div class="orbit-line hidden xl:block"></div>
    <div class="orbit-dot dot-1 hidden xl:block"></div>
    <div class="orbit-dot dot-2 hidden xl:block"></div>
    <div class="orbit-dot dot-3 hidden xl:block"></div>

    <!-- Main Content Area -->
    <main
        class="flex-grow flex flex-col lg:flex-row items-center justify-between px-10 md:px-20 pt-32 pb-48 z-10 relative max-w-7xl mx-auto w-full -translate-y-[45px]">

        <!-- Left Info Panel -->
        <div class="w-full lg:w-1/2 flex flex-col gap-6 z-20">
            <div id="info-container" class="fade-in-up active">
                <div class="flex items-center justify-between w-full mb-2">
                    <h1 id="creator-name"
                        class="text-6xl md:text-8xl font-heading font-bold uppercase leading-none tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 drop-shadow-lg">
                        ARJAV<br>JAIN.
                    </h1>
                    <div class="lg:hidden relative shrink-0">
                        <img id="mobile-creator-image" src="images/Arjav_Jain_Model.png" alt="Creator"
                            class="w-36 h-36 object-cover rounded-2xl shadow-[0_0_15px_rgba(128,144,184,0.4)] border border-[#8090B8]/50">
                    </div>
                </div>
                <h2 id="creator-role" class="text-accent font-heading tracking-widest text-xl uppercase mb-6">
                    FullStack Designer
                </h2>
                <div class="w-full max-w-md h-1.5 bg-[#111522] mb-6 relative rounded-full overflow-hidden">
                    <div class="absolute left-0 top-0 h-full w-1/3 bg-accent" style="box-shadow: 0 0 10px #8090B8;">
                    </div>
                </div>
                <p id="creator-desc"
                    class="text-gray-300 text-sm md:text-base leading-relaxed max-w-md mb-10 font-light">
                    Turning coffee into codes and bugs into features.
                </p>

                <!-- Skills Container -->
                <div id="skills-container" class="flex flex-wrap gap-4 w-full max-w-sm mt-4">
                    <!-- Skills injected via JS -->
                </div>

                <!-- Mobile Social Links -->
                <div class="flex lg:hidden gap-6 mt-6 ml-2">
                    <a id="mobile-link-linkedin" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="LinkedIn">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                        </svg>
                    </a>
                    <a id="mobile-link-github" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="GitHub">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                        </svg>
                    </a>
                    <a id="mobile-link-codeforces" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="Codeforces">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="14" width="4" height="7" fill="currentColor" stroke="none" />
                            <rect x="10" y="5" width="4" height="16" fill="currentColor" stroke="none" />
                            <rect x="17" y="10" width="4" height="11" fill="currentColor" stroke="none" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Right Image Panel -->
        <div class="hidden lg:flex w-full lg:w-1/2 justify-center lg:justify-end mt-16 lg:mt-0 relative z-10">
            <div id="image-container" class="fade-in-right active w-full max-w-md aspect-[3/4] relative">
                <img id="creator-image" src="images/Arjav_Jain_Model.png" alt="Arjav Jain"
                    class="w-full h-full object-cover rounded-2xl shadow-2xl">

                <!-- Social Links -->
                <div
                    class="absolute bottom-10 left-[-20px] bg-[#060608]/90 backdrop-blur-md border border-[#8090B8]/50 px-4 py-3 rounded-xl shadow-[0_0_15px_rgba(128,144,184,0.3)] flex gap-4">
                    <a id="link-linkedin" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="LinkedIn">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                        </svg>
                    </a>
                    <a id="link-github" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="GitHub">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                        </svg>
                    </a>
                    <a id="link-codeforces" href="#" target="_blank"
                        class="text-[#8090B8] hover:text-white transition-colors duration-300 hover:scale-110 transform"
                        title="Codeforces">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="none">
                            <rect x="3" y="14" width="4" height="7" fill="currentColor" />
                            <rect x="10" y="5" width="4" height="16" fill="currentColor" />
                            <rect x="17" y="10" width="4" height="11" fill="currentColor" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Carousel / Cards Area -->
    <div class="fixed bottom-0 left-0 w-full z-30 pb-6 px-4">
        <!-- Fade gradient for bottom edge -->
        <div
            class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-[#060608] to-transparent -z-10 pointer-events-none">
        </div>

        <div class="max-w-6xl mx-auto flex flex-nowrap overflow-x-auto lg:px-4 pb-4 scrollbar-hide -translate-y-[45px]"
            id="cards-container">
            <!-- Cards injected via JS -->
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
